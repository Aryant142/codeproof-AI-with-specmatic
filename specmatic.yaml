version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/apiService"
    runOptions:
      $ref: "#/components/runOptions/apiService"

dependencies:
  services:
    - service:
        $ref: "#/components/services/userService"
      runOptions:
        $ref: "#/components/runOptions/userServiceMock"
    - service:
        $ref: "#/components/services/insightService"
      runOptions:
        $ref: "#/components/runOptions/insightServiceMock"
    - service:
        $ref: "#/components/services/resourceService"
      runOptions:
        $ref: "#/components/runOptions/resourceServiceMock"
    - service:
        $ref: "#/components/services/analysisService"
      runOptions:
        $ref: "#/components/runOptions/analysisServiceMock"

components:
  sources:
    localFilesystem:
      filesystem:
        directory: .

  services:
    apiService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - spec:
                  id: apiSpec
                  path: contracts/api.yaml
    userService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/user.yaml
    insightService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/insight.yaml
    resourceService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/resource.yaml
    analysisService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/asyncapi/analysis.yaml

  runOptions:
    apiService:
      openapi:
        type: test
        actuatorUrl: http://127.0.0.1:3000/actuator/mappings
        specs:
          - spec:
              id: apiSpec

    userServiceMock:
      openapi:
        type: mock
        host: 127.0.0.1
        port: 9000
    insightServiceMock:
      openapi:
        type: mock
        host: 127.0.0.1
        port: 9000
    resourceServiceMock:
      openapi:
        type: mock
        host: 127.0.0.1
        port: 9000
    analysisServiceMock:
      asyncapi:
        type: mock
        servers:
          - host: "127.0.0.1:29092"
            protocol: kafka

specmatic:
  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic
    successCriteria:
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: "{SPECMATIC_LICENSE_PATH:/root/.specmatic/specmatic-license.txt}"

