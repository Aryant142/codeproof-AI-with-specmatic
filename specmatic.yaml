version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/apiService"
    runOptions:
      $ref: "#/components/runOptions/apiService"

dependencies:
  services:
    - service:
        $ref: "#/components/services/userService"
      host: 127.0.0.1
      port: 9000
    - service:
        $ref: "#/components/services/insightService"
      host: 127.0.0.1
      port: 9000
    - service:
        $ref: "#/components/services/resourceService"
      host: 127.0.0.1
      port: 9000
    - service:
        $ref: "#/components/services/analysisService"
      host: 127.0.0.1
      port: 29092

components:
  sources:
    localFilesystem:
      filesystem:
        directory: .

  services:
    apiService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - spec:
                  id: apiSpec
                  path: contracts/api.yaml
    userService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/user.yaml
    insightService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/insight.yaml
    resourceService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/openapi/resource.yaml
    analysisService:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystem"
            specs:
              - specs/asyncapi/analysis.yaml

  runOptions:
    apiService:
      openapi:
        type: test
        actuatorUrl: http://127.0.0.1:3000/actuator/mappings
        specs:
          - spec:
              id: apiSpec

specmatic:
  governance:
    report:
      formats:
        - html
        - ctrf
      outputDirectory: build/reports/specmatic
    successCriteria:
      minCoveragePercentage: 100
      maxMissedOperationsInSpec: 0
      enforce: true
  license:
    path: "{SPECMATIC_LICENSE_PATH:/root/.specmatic/specmatic-license.txt}"

