# Trigger Run #10 with Enterprise stub for AsyncAPI/Kafka support
name: Specmatic CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: codeproof-main/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd codeproof-main
          npm ci

      - name: Start Kafka Services
        run: |
          docker compose up -d kafka
          echo "Waiting for Kafka to be ready..."
          npx wait-on -t 30000 tcp:127.0.0.1:29092
          echo "Kafka is ready!"

      - name: Pull Specmatic Enterprise Image
        run: |
          docker pull specmatic/enterprise:1.20.0

      - name: Start Express Application and Run Specmatic Tests
        env:
          GEMINI_API_KEY: "mock_key"
          GROQ_API_KEY: "mock_key"
          VITE_APP_PIN: "7973"
          MOCK_API: "true"
          SPECMATIC_LICENSE_CONTENT: ${{ secrets.SPECMATIC_LICENSE_CONTENT }}
          SPECMATIC_LICENSE_PATH: /home/runner/.specmatic/specmatic-license.txt
          UserApi: http://127.0.0.1:9000
          InsightApi: http://127.0.0.1:9000
          ResourceApi: http://127.0.0.1:9000
        run: |
          echo "Checking Specmatic License Secret..."
          if [ -z "$SPECMATIC_LICENSE_CONTENT" ]; then
            echo "::error::SPECMATIC_LICENSE_CONTENT secret is empty or not set! Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          
          echo "Writing Specmatic License File..."
          mkdir -p /home/runner/.specmatic
          echo "$SPECMATIC_LICENSE_CONTENT" | tr -d '\r' > /home/runner/.specmatic/specmatic-license.txt
          
          echo "License file diagnostics:"
          echo "Actual file size: $(wc -c < /home/runner/.specmatic/specmatic-license.txt) bytes"
          echo "Actual file line count: $(wc -l < /home/runner/.specmatic/specmatic-license.txt)"
          echo "Actual file SHA256: $(sha256sum /home/runner/.specmatic/specmatic-license.txt | cut -d' ' -f1)"
          
          echo "Starting Specmatic Enterprise Stub on port 9000 (with AsyncAPI/Kafka support)..."
          mkdir -p build/reports/specmatic build/reports/contract-test
          docker run -d \
            --name specmatic-stub \
            -v /home/runner/.specmatic:/root/.specmatic \
            -v ${{ github.workspace }}:/usr/src/app \
            -w /usr/src/app \
            -e SPECMATIC_LICENSE_PATH=/root/.specmatic/specmatic-license.txt \
            --add-host=kafka:127.0.0.1 \
            --network host \
            specmatic/enterprise:1.20.0 \
            stub --config specmatic.yaml
          
          echo "Waiting for Specmatic Enterprise Stub to start..."
          npx wait-on -t 30000 tcp:127.0.0.1:9000
          echo "Specmatic Enterprise Stub started successfully!"
          
          echo "Stub container status after startup:"
          docker ps | grep specmatic-stub || echo "WARNING: stub container not running!"
          
          cd codeproof-main
          npm run dev &
          echo "Waiting for backend server to start..."
          npx wait-on -t 20000 http://localhost:3000/api/health
          echo "Backend server started successfully!"
          cd ..
          
          echo "Running Specmatic Contract Tests..."
          npx specmatic@2.49.1 test --host=127.0.0.1 --port=3000 --config specmatic.yaml > specmatic-test.log 2>&1 || contract_exit_code=$?
          cat specmatic-test.log
          
          echo "Backing up Contract Test Reports..."
          mkdir -p build/reports/contract-test
          sudo cp -r build/reports/specmatic/test/. build/reports/contract-test/

          echo "Stub container status before workflow test:"
          docker ps | grep specmatic-stub || echo "WARNING: stub container is NOT running before workflow test!"
          docker logs specmatic-stub 2>&1 | tail -20 || echo "Could not get stub logs"

          echo "Ensuring stub is running before workflow tests..."
          if ! docker ps --format '{{.Names}}' | grep -q specmatic-stub; then
            echo "Stub stopped — restarting for workflow tests..."
            docker rm -f specmatic-stub 2>/dev/null || true
            docker run -d \
              --name specmatic-stub \
              -v /home/runner/.specmatic:/root/.specmatic \
              -v ${{ github.workspace }}:/usr/src/app \
              -w /usr/src/app \
              -e SPECMATIC_LICENSE_PATH=/root/.specmatic/specmatic-license.txt \
              --add-host=kafka:127.0.0.1 \
              --network host \
              specmatic/enterprise:1.20.0 \
              stub --config specmatic.yaml
            echo "Waiting for stub to be ready on port 9000..."
            npx wait-on -t 30000 tcp:127.0.0.1:9000
            echo "Waiting 5s for stub to fully initialize..."
            sleep 5
            echo "Stub restarted and ready!"
          else
            echo "Stub is still running — no restart needed."
          fi

          echo "Running Specmatic Workflow Tests inside stub container..."
          docker exec \
            -e JAVA_TOOL_OPTIONS="-DUserApi=http://127.0.0.1:9000 -DInsightApi=http://127.0.0.1:9000 -DResourceApi=http://127.0.0.1:9000 -DAsyncAnalysisApi=127.0.0.1:9092" \
            -e DISABLE_GENERATIVE_TESTS="true" \
            specmatic-stub \
            sh -c 'specmatic test /usr/src/app/CodeProofAnalysisWorkflow.arazzo.yaml --config /usr/src/app/specmatic.yaml' \
            > specmatic-workflow.log 2>&1 || workflow_exit_code=$?
          cat specmatic-workflow.log

          if [ ! -z "$contract_exit_code" ]; then
            echo "Contract tests failed with exit code $contract_exit_code"
            exit $contract_exit_code
          fi
          if [ ! -z "$workflow_exit_code" ]; then
            echo "Workflow tests failed with exit code $workflow_exit_code"
            exit $workflow_exit_code
          fi

      - name: Print Docker Logs on Failure
        if: always()
        run: |
          echo "=== Docker Containers Status ==="
          docker ps -a
          echo "=== Specmatic Stub Container Logs ==="
          docker logs specmatic-stub 2>&1 || echo "No specmatic-stub logs found"

      - name: Upload Specmatic Contract Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-contract-test-reports
          path: build/reports/contract-test/
          retention-days: 14

      - name: Upload Specmatic Workflow Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-workflow-test-reports
          path: build/reports/specmatic/
          retention-days: 14

