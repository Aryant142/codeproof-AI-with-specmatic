# Trigger Run #9 with updated SPECMATIC_LICENSE_CONTENT secret
name: Specmatic CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: codeproof-main/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd codeproof-main
          npm ci

      - name: Start Kafka Services
        run: |
          docker compose up -d kafka

      - name: Start Express Application and Run Specmatic Tests
        env:
          GEMINI_API_KEY: "mock_key"
          GROQ_API_KEY: "mock_key"
          VITE_APP_PIN: "7973"
          MOCK_API: "true"
          SPECMATIC_LICENSE_CONTENT: ${{ secrets.SPECMATIC_LICENSE_CONTENT }}
          SPECMATIC_LICENSE_PATH: /home/runner/.specmatic/specmatic-license.txt
          UserApi: http://127.0.0.1:9000
          InsightApi: http://127.0.0.1:9000
          ResourceApi: http://127.0.0.1:9000
        run: |
          echo "Checking Specmatic License Secret..."
          if [ -z "$SPECMATIC_LICENSE_CONTENT" ]; then
            echo "::error::SPECMATIC_LICENSE_CONTENT secret is empty or not set! Please add it to your GitHub Repository Secrets."
            exit 1
          fi
          
          echo "Writing Specmatic License File..."
          mkdir -p /home/runner/.specmatic
          echo "$SPECMATIC_LICENSE_CONTENT" | tr -d '\r' > /home/runner/.specmatic/specmatic-license.txt
          
          echo "License file diagnostics:"
          echo "Actual file size: $(wc -c < /home/runner/.specmatic/specmatic-license.txt) bytes"
          echo "Actual file line count: $(wc -l < /home/runner/.specmatic/specmatic-license.txt)"
          echo "Actual file SHA256: $(sha256sum /home/runner/.specmatic/specmatic-license.txt | cut -d' ' -f1)"
          
          echo "Starting Specmatic Stubs on port 9000..."
          npx specmatic@2.49.1 stub --port=9000 --config specmatic.yaml &
          echo "Waiting for Specmatic Stubs to start..."
          npx wait-on -t 20000 tcp:127.0.0.1:9000
          echo "Specmatic Stubs started successfully!"
          
          cd codeproof-main
          npm run dev &
          echo "Waiting for backend server to start..."
          npx wait-on -t 20000 http://localhost:3000/api/health
          echo "Backend server started successfully!"
          cd ..
          
          echo "Running Specmatic Contract Tests..."
          npx specmatic@2.49.1 test --host=127.0.0.1 --port=3000 --config specmatic.yaml > specmatic-test.log 2>&1 || contract_exit_code=$?
          cat specmatic-test.log
          
          echo "Backing up Contract Test Reports..."
          mkdir -p build/reports/contract-test
          cp -r build/reports/specmatic/. build/reports/contract-test/
          rm -rf build/reports/specmatic
          
          echo "Running Specmatic Workflow Tests..."
          docker run --rm \
            -v /home/runner/.specmatic:/root/.specmatic \
            -v ${{ github.workspace }}:/usr/src/app \
            -w /usr/src/app \
            -e SPECMATIC_LICENSE_PATH=/root/.specmatic/specmatic-license.txt \
            -e UserApi=http://127.0.0.1:9000 \
            -e InsightApi=http://127.0.0.1:9000 \
            -e ResourceApi=http://127.0.0.1:9000 \
            -e AsyncAnalysisApi=127.0.0.1:29092 \
            --network host \
            specmatic/enterprise:1.20.0 \
            test CodeProofAnalysisWorkflow.arazzo.yaml --host=127.0.0.1 --port=3000 --config specmatic.yaml > specmatic-workflow.log 2>&1 || workflow_exit_code=$?
          cat specmatic-workflow.log

          if [ ! -z "$contract_exit_code" ]; then
            echo "Contract tests failed with exit code $contract_exit_code"
            exit $contract_exit_code
          fi
          if [ ! -z "$workflow_exit_code" ]; then
            echo "Workflow tests failed with exit code $workflow_exit_code"
            exit $workflow_exit_code
          fi

      - name: Upload Specmatic Contract Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-contract-test-reports
          path: build/reports/contract-test/
          retention-days: 14

      - name: Upload Specmatic Workflow Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-workflow-test-reports
          path: build/reports/specmatic/
          retention-days: 14
