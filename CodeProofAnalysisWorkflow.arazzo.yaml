arazzo: "1.0.0"
info:
  title: "Arazzo Workflow"
  version: "1.0.0"
sourceDescriptions:
- name: "UserApi"
  url: "./specs/openapi/user.yaml"
  type: "openapi"
- name: "InsightApi"
  url: "./specs/openapi/insight.yaml"
  type: "openapi"
- name: "AsyncAnalysisApi"
  url: "./specs/asyncapi/analysis.yaml"
  type: "asyncapi"
- name: "ResourceApi"
  url: "./specs/openapi/resource.yaml"
  type: "openapi"
workflows:
- workflowId: "CodeProofAnalysisWorkflow"
  inputs:
    required:
    - "getUserProfile"
    - "submitAnalysisSend"
    type: "object"
    properties:
      submitAnalysisSend:
        required:
        - "requestId"
        type: "object"
        properties:
          requestId:
            type: "string"
      getUserProfile:
        required:
        - "userEmail"
        type: "object"
        properties:
          userEmail:
            type: "string"
            format: "email"
  steps:
  - stepId: "getUserProfile"
    operationId: "$sourceDescriptions.UserApi.getUserProfile"
    parameters:
    - name: "userEmail"
      in: "query"
      value: "$inputs.getUserProfile.userEmail"
    successCriteria:
    - condition: "$statusCode == 200"
    outputs:
      userId: "$response.body#/userId"
      profileCode: "$response.body#/profileCode"
  - stepId: "getInsights"
    operationId: "$sourceDescriptions.InsightApi.getInsights"
    parameters:
    - name: "profileCode"
      in: "query"
      value: "$steps.getUserProfile.outputs.profileCode"
    successCriteria:
    - condition: "$statusCode == 200"
    - condition: "$response.body#/0/productId != null"
    - condition: "$response.body#/0/inventory != null"
    outputs:
      productId: "$response.body#/0/productId"
      inventory: "$response.body#/0/inventory"
  - stepId: "submitAnalysisSend"
    operationId: "$sourceDescriptions.AsyncAnalysisApi.submitAnalysis"
    action: "send"
    parameters:
    - name: "requestId"
      in: "header"
      value: "$inputs.submitAnalysisSend.requestId"
    requestBody:
      payload:
        userId: "$steps.getUserProfile.outputs.userId"
        productId: "$steps.getInsights.outputs.productId"
        inventory: "$steps.getInsights.outputs.inventory"
    outputs:
      requestId: "$message.header.requestId"
  - stepId: "submitAnalysisReceive"
    operationId: "$sourceDescriptions.AsyncAnalysisApi.submitAnalysis"
    action: "receive"
    correlationId: "$steps.submitAnalysisSend.outputs.requestId"
    timeout: 6000
    outputs:
      orderId: "$message.payload.orderId"
  - stepId: "allocateResources"
    operationId: "$sourceDescriptions.ResourceApi.allocateResources"
    dependsOn:
    - "$steps.submitAnalysisReceive"
    parameters:
    - name: "orderId"
      in: "query"
      value: "$steps.submitAnalysisReceive.outputs.orderId"
    successCriteria:
    - condition: "$statusCode == 200"
  - stepId: "processingCompleted"
    operationId: "$sourceDescriptions.AsyncAnalysisApi.processingCompleted"
    action: "send"
    dependsOn:
    - "$steps.submitAnalysisReceive"
    parameters:
    - name: "requestId"
      in: "header"
      value: "$steps.submitAnalysisSend.outputs.requestId"
    requestBody:
      payload:
        orderId: "$steps.submitAnalysisReceive.outputs.orderId"
  - stepId: "reportGenerated"
    operationId: "$sourceDescriptions.AsyncAnalysisApi.reportGenerated"
    action: "receive"
    correlationId: "$steps.submitAnalysisSend.outputs.requestId"
    timeout: 6000
    outputs:
      insightId: "$message.payload.insightId"
  - stepId: "getInsightDetails"
    operationId: "$sourceDescriptions.InsightApi.getInsightDetails"
    dependsOn:
    - "$steps.reportGenerated"
    parameters:
    - name: "insightId"
      in: "path"
      value: "$steps.reportGenerated.outputs.insightId"
    successCriteria:
    - condition: "$statusCode == 200"

- workflowId: "CodeProofAnalysisWorkflowEmpty"
  inputs:
    required:
    - "getUserProfile"
    type: "object"
    properties:
      submitAnalysisSend:
        type: "object"
        properties:
          requestId:
            type: "string"
      getUserProfile:
        required:
        - "userEmail"
        type: "object"
        properties:
          userEmail:
            type: "string"
            format: "email"
  steps:
  - stepId: "getUserProfile"
    operationId: "$sourceDescriptions.UserApi.getUserProfile"
    parameters:
    - name: "userEmail"
      in: "query"
      value: "$inputs.getUserProfile.userEmail"
    successCriteria:
    - condition: "$statusCode == 200"
    outputs:
      userId: "$response.body#/userId"
      profileCode: "$response.body#/profileCode"
  - stepId: "getInsights"
    operationId: "$sourceDescriptions.InsightApi.getInsights"
    parameters:
    - name: "profileCode"
      in: "query"
      value: "$steps.getUserProfile.outputs.profileCode"
    successCriteria:
    - condition: "$statusCode == 200"
    - condition: "$response.body#/0 == null"

components: {}
