openapi: 3.0.3

info:
  title: Resource Allocation API
  version: 1.0.0
  description: A service to allocate computation/engine resources for student code analysis.
  contact:
    name: CodeProof
    email: codeproof@devs.io

servers:
  - url: http://127.0.0.1:9000
    description: Local development server

tags:
  - name: Resource

paths:
  /resources:
    put:
      summary: Allocate resources
      description: Allocates execution container resources for the analysis transaction.
      operationId: allocateResources
      tags:
        - Resource
      parameters:
        - name: orderId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resources successfully allocated.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "INVALID_RESOURCE_REQUEST"
                message: "Invalid request parameters for resource allocation"
        "404":
          description: Context or Order not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "RESOURCE_NOT_FOUND"
                message: "The requested resource allocation could not be found."

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "RESOURCE_ALLOCATION_FAILED"
        message:
          type: string
          example: "Failed to allocate analysis execution containers."
