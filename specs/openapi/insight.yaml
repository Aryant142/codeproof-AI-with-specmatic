openapi: 3.0.3

info:
  title: Insights and Reports API
  version: 1.0.0
  description: A service to retrieve insights and analysis reports for students.
  contact:
    name: CodeProof
    email: codeproof@devs.io

servers:
  - url: http://stub:9000
    description: Local development server

tags:
  - name: Insights

paths:
  /insights:
    get:
      summary: Get insights by context/profile
      description: Retrieves a list of available insights/reports for a user context.
      operationId: getInsights
      tags:
        - Insights
      parameters:
        - name: profileCode
          in: query
          description: The profile code or context code.
          required: true
          schema:
            type: string
            example: "STUDENT-CONTEXT"
      responses:
        "200":
          description: Successful retrieval of insights.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "INVALID_INSIGHT_REQUEST"
                message: "Invalid request parameters for insights"

  /insights/{insightId}:
    get:
      summary: Get insight details
      description: Retrieves detailed analysis metrics for a specific insight.
      operationId: getInsightDetails
      tags:
        - Insights
      parameters:
        - name: insightId
          in: path
          description: The unique identifier of the insight to retrieve.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful retrieval of insight details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightResponse"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "INVALID_INSIGHT_REQUEST"
                message: "Invalid request parameters for insight details"
        "404":
          description: Insight not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "INSIGHT_NOT_FOUND"
                message: "The requested insightId does not exist"

components:
  schemas:
    Insight:
      type: object
      required:
        - productId
        - name
        - price
        - inventory
      properties:
        productId:
          type: integer
          description: Unique identifier for the related coursework/product
        name:
          type: string
          example: "Plagiarism analysis report"
        price:
          type: number
          format: double
          example: 0.0
        inventory:
          type: integer
          example: 10

    InsightResponse:
      type: object
      required:
        - orderId
        - userId
        - status
      properties:
        orderId:
          type: string
          format: uuid
          description: The unique identifier of the transaction/order.
        userId:
          type: string
          format: uuid
          description: The unique identifier of the user.
        productId:
          type: integer
        inventory:
          type: integer
          example: 2
        status:
          type: string
          enum:
            - PENDING
            - ACCEPTED
            - OUT_FOR_DELIVERY
          example: "PENDING"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "INVALID_INSIGHT_ID"
        message:
          type: string
          example: "The provided insightId is not valid."
