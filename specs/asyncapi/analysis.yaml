asyncapi: 3.0.0

info:
  title: Code Analysis Processing Workflow
  version: 1.0.0
  description: >
    Event-driven workflow for CodeProof analysis.
  contact:
    name: CodeProof
    email: codeproof@devs.io

servers:
  localKafka:
    host: kafka:29092
    protocol: kafka
    description: Development server

channels:
  newAnalyses:
    address: new-analyses
    messages:
      analysisRequest:
        $ref: "#/components/messages/AnalysisRequest"

  wipAnalyses:
    address: wip-analyses
    messages:
      wipStatus:
        $ref: "#/components/messages/WipStatus"

  acceptedAnalyses:
    address: accepted-analyses
    messages:
      acceptedStatus:
        $ref: "#/components/messages/AcceptedStatus"

  deliveryUpdates:
    address: completed-analyses
    messages:
      deliveryStatus:
        $ref: "#/components/messages/DeliveryUpdate"

operations:
  submitAnalysis:
    description: Handles a new analysis request
    action: receive
    channel:
      $ref: "#/channels/newAnalyses"
    messages:
      - $ref: "#/channels/newAnalyses/messages/analysisRequest"
    reply:
      channel:
        $ref: "#/channels/wipAnalyses"
      messages:
        - $ref: "#/channels/wipAnalyses/messages/wipStatus"

  reportGenerated:
    description: Notifies that report has been generated
    action: send
    channel:
      $ref: "#/channels/acceptedAnalyses"
    messages:
      - $ref: "#/channels/acceptedAnalyses/messages/acceptedStatus"

  processingCompleted:
    description: Handles final processing completion update
    action: receive
    channel:
      $ref: "#/channels/deliveryUpdates"
    messages:
      - $ref: "#/channels/deliveryUpdates/messages/deliveryStatus"

components:
  messages:
    AnalysisRequest:
      name: AnalysisRequest
      title: New Analysis Request
      contentType: application/json
      correlationId:
        location: "$message.header#/requestId"
      headers:
        type: object
        properties:
          requestId:
            type: string
            format: uuid
        required:
          - requestId
      payload:
        type: object
        required:
          - userId
          - productId
          - inventory
        properties:
          userId:
            type: string
            format: uuid
          productId:
            type: integer
          inventory:
            type: integer

    WipStatus:
      name: WipStatus
      title: Work-In-Progress Status
      contentType: application/json
      correlationId:
        location: "$message.header#/requestId"
      headers:
        type: object
        properties:
          requestId:
            type: string
            format: uuid
        required:
          - requestId
      payload:
        type: object
        required:
          - orderId
          - status
        properties:
          orderId:
            type: integer
          status:
            type: string
            enum: ["PENDING"]

    AcceptedStatus:
      name: AcceptedStatus
      title: Analysis Accepted Status
      contentType: application/json
      correlationId:
        location: "$message.header#/requestId"
      headers:
        type: object
        properties:
          requestId:
            type: string
            format: uuid
        required:
          - requestId
      payload:
        type: object
        required:
          - status
          - insightId
        properties:
          status:
            type: string
            enum: ["ACCEPTED"]
          insightId:
            type: string
            format: uuid
            description: The unique identifier of the generated insight report.

    DeliveryUpdate:
      name: DeliveryUpdate
      title: Processing Completion Update
      correlationId:
        location: "$message.header#/requestId"
      headers:
        type: object
        properties:
          requestId:
            type: string
            format: uuid
        required:
          - requestId
      payload:
        type: object
        required:
          - orderId
        properties:
          orderId:
            type: integer
